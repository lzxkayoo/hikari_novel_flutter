name: Flutter Auto Build APK

on:
  workflow_dispatch: # 支持手动点击运行
  push:
    branches: [ "main", "master", "develop" ] # 当这些分支有变动时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取源码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 Java 环境（Flutter 编译 Android 同样需要 Java）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 在云端配置 Flutter 环境
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'       
        flutter-version: 'any'  
        cache: true             
        
    # 4. 获取 Flutter 依赖包
    - name: Install dependencies
      run: flutter pub get

    # 5. 编译正式版 APK
    - name: Build APK
      run: flutter build apk --release

    # 6.改名
    - name: Rename APK File
      run: |
        cd build/app/outputs/flutter-apk/
        mv app-release.apk hikari-novel.apk

    # 7. 将编译好的 APK 上传到 GitHub Actions 产物中
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flutter-release-apk
        path: build/app/outputs/flutter-apk/hikari-novel.apk
