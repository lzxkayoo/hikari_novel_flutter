name: Auto Build APK

on:
  workflow_dispatch: # 支持手动点击运行
  push:
    branches: [ "main", "master", "develop" ] # 当这些分支有变动时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取源码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 Java 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 配置 Flutter 环境
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'       
        flutter-version: 'any'  
        cache: true             

    # 4. 获取 Flutter 依赖包
    - name: Install dependencies
      run: flutter pub get

    # 5. 编译正式版 APK（Release 产物更小、运行更流畅）
    - name: Build APK
      run: flutter build apk --release

    # 6. 重命名 APK
    - name: Rename APK File
      run: |
        cd build/app/outputs/flutter-apk/
        # 获取当前日期
        DATE=$(date +'%Y%m%d')
        # 使用 GitHub 变量自动获取仓库名，拼接成：仓库名-日期.apk
        mv app-release.apk "${{ github.event.repository.name }}-$DATE.apk"

    #7. 上传 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flutter-release-apk
        # 用通配符 *.apk，这样不管名字怎么变都能识别并上传
        path: build/app/outputs/flutter-apk/*.apk
