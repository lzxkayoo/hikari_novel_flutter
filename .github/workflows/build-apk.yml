name: Flutter Auto Build & Release

on:
  workflow_dispatch: # 支持你在 GitHub 网页端手动点击 "Run workflow" 运行
  push:
    branches: [ "main", "master", "develop" ] # 当这些分支有代码推入时自动触发
    tags:
      - 'v*' # 当你发布形如 v1.0.0 的版本标签时自动触发

# 允许 Actions 脚本向你的仓库写入 Release 和上传文件
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库源码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 Java 环境（Flutter 编译 Android 必备）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 配置 Flutter 环境
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'       # 使用最新稳定版 Flutter
        flutter-version: 'any'  # 自动获取
        cache: true             # 开启缓存，极大缩短后续打包时间

    # 4. 获取项目所有的 Flutter 依赖包
    - name: Install dependencies
      run: flutter pub get

    # 5. 编译正式版 APK（Release 包体积更小，运行更流畅）
    - name: Build APK
      run: flutter build apk --release

    # 6. 自动重命名 APK（防止多次编译名字冲突）
    # 此时文件会被重命名为：你的项目名-v构建号.apk (例如：my-app-v5.apk)
    - name: Rename APK File
      run: |
        cd build/app/outputs/flutter-apk/
        mv app-release.apk "${{ github.event.repository.name }}-v${{ github.run_number }}.apk"

    # 7. 将生成的 APK 自动发布到 GitHub Releases
    - name: Push to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        # 如果是手动点击运行，自动使用 v+构建号当版本号（如 v5）；如果是推送标签，则使用标签名
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
        name: ${{ github.ref_type == 'tag' && github.ref_name || format('自动编译版 v{0}', github.run_number) }}
        body: |
          这是由 GitHub Actions 自动编译生成的 Flutter 正式版 APK。
          
          - **应用名称**: `${{ github.event.repository.name }}`
          - **构建编号**: `#${{ github.run_number }}`
          - **编译时间**: ${{ github.event.repository.updated_at }}
        draft: false        # 直接公开发布，不存为草稿
        prerelease: false   # 标记为正式版，而不是预发布版
        # 扫描指定目录下的所有 apk 文件（即刚才改名后的文件）并挂载到 Release 附件中
        files: build/app/outputs/flutter-apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动生成的临时令牌，无需手动创建
